<?xml version="1.0" encoding="UTF-8"?>
<!-- File: SubtractMoney.svg -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     width="100%"
     height="100%"
     role="img"
     aria-label="Subtract money icon">

  <!-- Top slot -->
  <path d="M18 15
           H82
           Q88 15 88 21
           V31
           Q88 37 82 37
           H70
           V27
           H30
           V37
           H18
           Q12 37 12 31
           V21
           Q12 15 18 15 Z"
        fill="none"
        stroke="#000000"
        stroke-width="3"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Money bill (wider) -->
  <path d="M30 23
           H70
           V73
           Q70 83 60 83
           H40
           Q30 83 30 73
           Z"
        fill="none"
        stroke="#000000"
        stroke-width="3"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Bottom inner bill detail -->
  <path d="M36 74
           Q36 68 42 68
           H58
           Q64 68 64 74"
        fill="none"
        stroke="#000000"
        stroke-width="3"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Red center circle -->
  <circle cx="50" cy="49" r="11" fill="#ef4444"/>

  <!-- White minus -->
  <path d="M44 49 H56"
        fill="none"
        stroke="#ffffff"
        stroke-width="3.5"
        stroke-linecap="round"/>
</svg>
