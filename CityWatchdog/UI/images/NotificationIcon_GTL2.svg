<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.1"
     viewBox="0 0 100 100"
     width="100%"
     height="100%"
     role="img"
     aria-label="Notification icon">

  <!-- Shift whole icon a little left and down -->
  <g transform="translate(-2 2)">
    <!-- Centered and made a little wider -->
    <g transform="translate(50 50) scale(1.18 1.16) translate(-50 -50)">

      <!-- Outer dark outline -->
      <g fill="none"
         stroke="#FFFFFF"
         stroke-width="8"
         stroke-linecap="round"
         stroke-linejoin="round">
        <path d="M31 22H63"/>
        <path d="M82 42V61Q82 72 71 72H63L56 80Q52 84 48 80L41 72H28Q17 72 17 61V36Q17 22 31 22"/>
        <circle cx="76" cy="24" r="12"/>
      </g>

      <!-- Inner white outline -->
      <g fill="none"
         stroke="#FFFFFF"
         stroke-width="7.4"
         stroke-linecap="round"
         stroke-linejoin="round">
        <path d="M31 22H63"/>
        <path d="M82 42V61Q82 72 71 72H63L56 80Q52 84 48 80L41 72H28Q17 72 17 61V36Q17 22 31 22"/>
        <circle cx="76" cy="24" r="12" fill="#38BDF8"/>
      </g>

      <!-- Three message dots -->
      <circle cx="35.5" cy="54" r="5.8" fill="#D9D9D9"/>
      <circle cx="50" cy="50.8" r="5.8" fill="#D9D9D9"/>
      <circle cx="64.5" cy="54" r="5.8" fill="#D9D9D9"/>

    </g>
  </g>
</svg>
