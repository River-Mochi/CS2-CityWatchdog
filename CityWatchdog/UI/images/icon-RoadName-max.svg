      stroke="#222222"
      stroke-width="2.4"
      stroke-linejoin="round"
      paint-order="stroke fill"
      d="M40.703 49.944L38.169 45.373H27.296L24.763 49.944H18.789L29.201 32.056H36.244L46.611 49.944H40.703ZM36.834 42.554L34.015 37.415L32.719 34.811Q32.395 35.546 32.11 36.131Q31.831 36.716 28.631 42.554H36.834Z"/>

  </g>
</svg>