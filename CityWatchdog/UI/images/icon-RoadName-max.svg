<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="100%"
     height="100%"
     fill-rule="evenodd"
     clip-rule="evenodd"
     stroke-linejoin="round"
     stroke-miterlimit="2">

  <!-- Clean overall scale for small CS2 toolbar use -->
  <g transform="translate(32 32) scale(1.16) translate(-32 -32)">

    <!-- Road -->
    <g id="road" transform="translate(32 32) rotate(14) translate(-32 -32)">
      <!-- Road sides / outer border -->
      <path
        fill="#B8BCC2"
        d="M6.698 27.512 35.662 51.816 57.334 39.303v-2.588L35.9 49.09 6.666 24.56l.032 2.952Z"/>

      <!-- Road surface -->
      <path
