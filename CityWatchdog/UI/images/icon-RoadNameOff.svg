<svg xmlns="http://www.w3.org/2000/svg"
     xml:space="preserve"
     viewBox="0 0 64 64"
     width="100%"
     height="100%"
     fill-rule="evenodd"
     clip-rule="evenodd"
     stroke-linejoin="round"
     stroke-miterlimit="2">

  <defs>
    <!-- Keep only the left part of the A visible -->
    <clipPath id="a-left-half">
      <rect x="0" y="0" width="33.4" height="64"/>
    </clipPath>
  </defs>

  <!-- Same original road icon -->
  <g transform="translate(32 32) scale(1.18) translate(-32 -32)">
    <g id="road">
      <!-- Road sides -->
      <path
        fill="#444"
        fill-rule="nonzero"
        d="m6.698 27.512 28.964 24.304 21.672-12.513v-2.588L35.9 49.09 6.666 24.56l.032 2.952Z"/>

      <!-- Road surface -->
      <path
        fill="#929191"
        fill-rule="nonzero"
        d="M6.666 24.56 35.9 49.09l21.434-12.375L28.1 12.185 6.666 24.56Z"/>

      <!-- Lane markers -->
      <path
        fill="#d4d4d4"
        d="m19.451 19.826 3.657 3.065-.895.517-3.647-3.071.885-.511Zm5.486 4.598 3.656 3.064-.909.525-3.647-3.07.9-.519Zm5.484 4.597 3.636 3.047-.924.533-3.625-3.053.913-.527Zm5.464 4.58 3.576 2.997-.937.541-3.567-3.003.928-.535Zm5.405 4.53 3.758 3.149-.952.55-3.748-3.156.942-.543Z"/>
    </g>

    <!-- Partial dashed A -->
    <text
      x="32"
      y="30"
      clip-path="url(#a-left-half)"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="19.8"
      font-weight="700"
      fill="none"
      stroke="#ffffff"
      stroke-width="1.1"
      stroke-dasharray="1.4 1.6"
      stroke-linecap="round"
      paint-order="stroke">A</text>

    <!-- Simple eraser: border changed to road dark gray -->
    <g transform="rotate(-20 42.75 23)">
      <rect x="31.25" y="16.6" width="23" height="12.8" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
      <rect x="42.75" y="16.6" width="11.5" height="12.8" fill="#8EDFED" stroke="#444" stroke-width="0.8"/>
    </g>
  </g>
</svg>
